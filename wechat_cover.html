<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>PalmClaw WeChat Cover</title>
  <style>
    @font-face {
      font-family: "PalmClaw Sans";
      src: url("assets/fonts/plus_jakarta_sans_bold.ttf") format("truetype");
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }

    body {
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #eef; /* just for preview */
    }

    /* 900x383 is the standard dimension for WeChat Official Account primary cover */
    .cover {
      width: 900px;
      height: 383px;
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(900px 400px at 10% -10%, #efe1d0 0%, transparent 60%),
        radial-gradient(800px 400px at 90% 0%, #f3e5d6 0%, transparent 65%),
        #f9f4ef;
      background-color: #f9f4ef;
      font-family: "PalmClaw Sans", "Plus Jakarta Sans", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans CJK SC", "Segoe UI", system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.1); /* just for preview out of context */
    }

    /* Decorative background blobs to mimic the brand aesthetic */
    .cover::before {
      content: "";
      position: absolute;
      inset: -150px auto auto -150px;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(140, 120, 81, 0.08) 0%, rgba(140, 120, 81, 0) 70%);
      pointer-events: none;
    }

    .cover::after {
      content: "";
      position: absolute;
      inset: auto -150px -150px auto;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(242, 80, 66, 0.15) 0%, rgba(242, 80, 66, 0) 70%);
      pointer-events: none;
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 18px;
      z-index: 10;
      margin-bottom: 24px;
    }

    .logo {
      width: 80px;
      height: 80px;
      object-fit: contain;
      filter: brightness(0) saturate(100%);
    }

    h1 {
      margin: 0;
      color: #716040;
      font-size: 72px;
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1;
    }

    p {
      margin: 0;
      color: #4f4b43;
      font-size: 28px;
      font-weight: 500;
      letter-spacing: 0.04em;
      z-index: 10;
    }

    .badge {
      margin-top: 28px;
      padding: 10px 24px;
      background: #8c7851;
      color: #fff;
      border-radius: 999px;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.05em;
      z-index: 10;
      box-shadow: 0 8px 20px rgba(140, 120, 81, 0.3);
    }
  </style>
</head>
<body>
  <!-- Capture this .cover element for the image -->
  <div class="cover">
    <div class="logo-container">
      <img class="logo" src="assets/PalmClaw-removebg-preview.png" alt="Logo">
      <h1>PalmClaw</h1>
    </div>
    <p>你的私人手机 AI 助手</p>
    <div class="badge">简单 · 安全 · 随时在线</div>
  </div>
</body>
</html>
